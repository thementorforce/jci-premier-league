name: Build and Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: jci-premier-league # Hardcoded GCP Project ID
  SERVICE_NAME: franchise-cricket-league
  REGION: asia-south1

jobs:
  deploy:
    name: Deploy to Google Cloud Run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # Authentication with Google Cloud
      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }} # Add GCP Service Account JSON key to GitHub Secrets

      # Setup gcloud CLI
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      # Configure Docker to use Artifact Registry
      - name: Authorize Docker
        run: |
          gcloud auth configure-docker asia-south1-docker.pkg.dev --quiet

      # Create Artifact Registry Repository if not exists
      - name: Create Registry Repository
        run: |
          gcloud artifacts repositories create fcl-repo \
            --repository-format=docker \
            --location=asia-south1 \
            --quiet || true

      # Switch Prisma provider to PostgreSQL for production deployment
      - name: Configure Prisma for PostgreSQL
        run: |
          sed -i 's/provider = "sqlite"/provider = "postgresql"/' prisma/schema.prisma

      # Build and Push Docker Image
      - name: Build and Push Docker Image
        run: |
          docker build -t asia-south1-docker.pkg.dev/${{ env.PROJECT_ID }}/fcl-repo/${{ env.SERVICE_NAME }}:${{ github.sha }} .
          docker push asia-south1-docker.pkg.dev/${{ env.PROJECT_ID }}/fcl-repo/${{ env.SERVICE_NAME }}:${{ github.sha }}

      # Deploy to Google Cloud Run
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image asia-south1-docker.pkg.dev/${{ env.PROJECT_ID }}/fcl-repo/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --cpu-throttling \
            --min-instances 0 \
            --set-env-vars DATABASE_URL="${{ secrets.GCP_DATABASE_URL }}",DB_HOST="${{ secrets.DB_HOST }}",DB_PORT="${{ secrets.DB_PORT }}",DB_NAME="${{ secrets.DB_NAME }}",DB_USER="${{ secrets.DB_USER }}",DB_PASSWORD="${{ secrets.DB_PASSWORD }}"

