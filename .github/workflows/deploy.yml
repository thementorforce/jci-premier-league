name: Build and Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }} # Add GCP Project ID to GitHub Secrets
  SERVICE_NAME: franchise-cricket-league
  REGION: us-central1

jobs:
  deploy:
    name: Deploy to Google Cloud Run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # Authentication with Google Cloud
      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }} # Add GCP Service Account JSON key to GitHub Secrets

      # Setup gcloud CLI
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      # Configure Docker to use Artifact Registry
      - name: Authorize Docker
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      # Create Artifact Registry Repository if not exists
      - name: Create Registry Repository
        run: |
          gcloud artifacts repositories create fcl-repo \
            --repository-format=docker \
            --location=us-central1 \
            --quiet || true

      # Build and Push Docker Image
      - name: Build and Push Docker Image
        run: |
          docker build -t us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/fcl-repo/${{ env.SERVICE_NAME }}:${{ github.sha }} .
          docker push us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/fcl-repo/${{ env.SERVICE_NAME }}:${{ github.sha }}

      # Deploy to Google Cloud Run
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/fcl-repo/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --add-cloudsql-instances ${{ secrets.GCP_CLOUDSQL_CONNECTION_NAME }} \
            --set-env-vars DATABASE_URL="${{ secrets.GCP_DATABASE_URL }}"
