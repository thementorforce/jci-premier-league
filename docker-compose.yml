version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: fcl-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: fcl_user
      POSTGRES_PASSWORD: fcl_password
      POSTGRES_DB: franchise_cricket_league
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
